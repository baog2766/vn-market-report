name: Daily Market Report

on:
  schedule:
    - cron: '45 8 * * 1-5'  # 15:45 ICT, Monday-Friday
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Debug Secrets
        run: |
          echo "========================================="
          echo "🔍 Checking Secrets Configuration..."
          echo "========================================="
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN is EMPTY"
          else
            echo "✅ TELEGRAM_BOT_TOKEN is set"
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ TELEGRAM_CHAT_ID is EMPTY"
          else
            echo "✅ TELEGRAM_CHAT_ID is set"
          fi
          if [ -z "$VNSTOCK_API_KEY" ]; then
            echo "❌ VNSTOCK_API_KEY is EMPTY"
          else
            echo "✅ VNSTOCK_API_KEY is set (length: ${#VNSTOCK_API_KEY})"
          fi
          echo "========================================="
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
      
      - name: Cache database
        uses: actions/cache@v3
        with:
          path: vn_market.db
          key: db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            db-${{ runner.os }}-
      
      - name: Generate & Send Report
        run: python vn_market_daily.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
